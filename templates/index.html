<!DOCTYPE html>
<html>
<head>
    <title>Email Spam Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=1">
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <img src="{{ url_for('static', filename='logo.png') }}" alt="App Logo" width="150">

        <!-- App Title -->
        <h1>Email Spam Detector</h1>

        <h2>Enter Email Text</h2>
        <form action="/predict" method="post">
            <textarea name="email" rows="10" placeholder="Paste your email here..."></textarea><br><br>
            <input type="submit" value="Check for Spam">
        </form>
    </div>
</body>
</html>
